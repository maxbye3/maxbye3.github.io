<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Stealth Game</title>
    <meta
      name="description"
      content="Play the latest Vercel deployment of the stealth game."
    />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #000;
        overflow: hidden;
      }

      iframe {
        display: block;
        width: 100vw;
        height: 100vh;
        border: 0;
        background: #000;
      }

      .fallback {
        position: fixed;
        inset: auto 16px 16px;
        z-index: 1;
        width: max-content;
        max-width: calc(100vw - 32px);
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.68);
        color: #fff;
        font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .fallback a {
        color: #b7f7cf;
      }
    </style>
  </head>
  <body>
    <iframe
      src="https://stealth-game-one.vercel.app"
      title="Stealth Game"
      allow="autoplay; fullscreen; gamepad"
      allowfullscreen
    ></iframe>
    <noscript>
      <p class="fallback">
        JavaScript is disabled.
        <a href="https://stealth-game-one.vercel.app">Open the stealth game directly.</a>
      </p>
    </noscript>
    <script>
      const frame = document.querySelector("iframe");
      function requestShellFullscreen() {
        if (document.fullscreenElement) return;
        document.documentElement.requestFullscreen().catch(() => {});
      }
      window.addEventListener("message", (event) => {
        if (event.source !== frame.contentWindow) return;
        if (event.data?.type === "nightslip-request-fullscreen") requestShellFullscreen();
      });
    </script>
  </body>
</html>
